// ---------- Page header ----------
function PageHeader({ title, subtitle, right }) {
  return (
    <div className="flex items-end justify-between mb-6">

}

// ---------- Card ----------
function Card({ children, className = "", style = {}, padding = 24 }) {
  return (
    <div className={"bg-white card-shadow " + className} style={{ borderRadius: 12, padding, border: "1px solid #E5E7EB", ...style }}>
      {children}
    </div>
  );
}

// ---------- Status pill ----------
function StatusPill({ kind }) {
  const map = {
    "In Stock":     { bg: "#DCFCE7", fg: "#16A34A" },
    "Low":          { bg: "#FEF3C7", fg: "#D97706" },
    "Critical":     { bg: "#FEE2E2", fg: "#DC2626" },
    "Out of Stock": { bg: "#F3F4F6", fg: "#374151" },
    "Shipped":      { bg: "#DCFCE7", fg: "#16A34A" },
    "In Progress":  { bg: "#F5DDCD", fg: "#C25E3F" },
    "Completed":    { bg: "#F3F4F6", fg: "#374151" },
  };
  const c = map[kind] || { bg: "#F3F4F6", fg: "#374151" };
  return (
    <span style={{ background: c.bg, color: c.fg, fontSize: 12, fontWeight: 600, padding: "4px 10px", borderRadius: 999, display: "inline-flex", alignItems: "center" }}>
      {kind}
    </span>
  );
}

// ---------- KPI Card ----------
function KPI({ label, value, valueColor = "#111827", trend, trendKind, sub, onClick }) {
  const I = window.LIcons;
  const trendColor = trendKind === "good" ? "#16A34A" : trendKind === "bad" ? "#DC2626" : "#6B7280";
  const clickable = typeof onClick === "function";
  return (
    <div
      onClick={onClick}
      style={{
        cursor: clickable ? "pointer" : "default",
        transition: "transform .15s, box-shadow .15s",
      }}
      onMouseEnter={(e) => { if (clickable) { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 6px 16px rgba(217,119,87,0.15)"; } }}
      onMouseLeave={(e) => { if (clickable) { e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; } }}
    >
      <Card>
        <div style={{ fontSize: 13, color: "#6B7280", fontWeight: 500 }}>{label}</div>
        <div className="num-tabular" style={{ fontSize: 28, fontWeight: 700, color: valueColor, marginTop: 8, letterSpacing: -0.5 }}>{value}</div>
        {trend && (
          <div className="flex items-center gap-1 mt-2" style={{ fontSize: 12, color: trendColor, fontWeight: 600 }}>
            {trendKind === "bad"
              ? <I.TrendingUp size={14} />
              : <I.TrendingUp size={14} />}
            <span>{trend}</span>
            {sub && <span style={{ color: "#6B7280", fontWeight: 500 }}>{sub}</span>}
          </div>
        )}
      </Card>
    </div>
  );
}

// ---------- Modal ----------
function Modal({ open, onClose, title, subtitle, children, width = 560 }) {
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    const prevOverflow = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return () => {
      document.removeEventListener("keydown", onKey);
      document.body.style.overflow = prevOverflow;
    };
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div
      onClick={onClose}
      style={{ position: "fixed", inset: 0, background: "rgba(38,38,36,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50, padding: 20, backdropFilter: "blur(2px)" }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{ background: "white", borderRadius: 14, width: "100%", maxWidth: width, maxHeight: "85vh", overflow: "auto", boxShadow: "0 20px 50px rgba(0,0,0,0.25)", border: "1px solid #E5E7EB" }}
      >
        <div className="flex items-start justify-between" style={{ padding: "20px 24px", borderBottom: "1px solid #E5E7EB" }}>
          <div>
            <div style={{ fontSize: 17, fontWeight: 700, color: "#111827" }}>{title}</div>
            {subtitle && <div style={{ fontSize: 13, color: "#6B7280", marginTop: 2 }}>{subtitle}</div>}
          </div>
          <button
            onClick={onClose}
            aria-label="Close"
            style={{ width: 32, height: 32, borderRadius: 8, color: "#6B7280", fontSize: 20, lineHeight: 1, display: "flex", alignItems: "center", justifyContent: "center" }}
            onMouseEnter={(e) => e.currentTarget.style.background = "#FAF9F5"}
            onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}
          >×</button>
        </div>
        <div style={{ padding: 20 }}>{children}</div>
      </div>
    </div>
  );
}

const MATERIAL_TYPES = ["UV Resin", "PLA Filament", "ABS Filament", "PETG Filament", "Flexible TPU"];

function FormField({ label, children, hint }) {
  return (
    <label className="block">
      <div style={{ fontSize: 13, fontWeight: 500, color: "#374151", marginBottom: 6 }}>{label}</div>
      {children}
      {hint && <div style={{ fontSize: 11, color: "#9CA3AF", marginTop: 4 }}>{hint}</div>}
    </label>
  );
}

function Input({ value, onChange, placeholder, type = "number", step = "any", prefix, suffix }) {
  return (
    <div className="flex items-center" style={{ background: "white", border: "1px solid #E5E7EB", borderRadius: 8, height: 40 }}>
      {prefix && <span style={{ paddingLeft: 12, color: "#6B7280", fontSize: 14 }}>{prefix}</span>}
      <input
        type={type}
        step={step}
        placeholder={placeholder}
        value={value}
        onChange={(e) => onChange(e.target.value)}
        className="flex-1 px-3 outline-none num-tabular"
        style={{ fontSize: 14, height: "100%", background: "transparent", color: "#111827", borderRadius: 8 }}
      />
      {suffix && <span style={{ paddingRight: 12, color: "#6B7280", fontSize: 13 }}>{suffix}</span>}
    </div>
  );
}

function Select({ value, onChange, options }) {
  const I = window.LIcons;
  return (
    <div className="relative">
      <select
        value={value}
        onChange={(e) => onChange(e.target.value)}
        className="w-full appearance-none outline-none"
        style={{ height: 40, padding: "0 36px 0 12px", border: "1px solid #E5E7EB", borderRadius: 8, fontSize: 14, background: "white", color: "#111827" }}
      >
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
      <I.ChevronDown size={16} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", pointerEvents: "none", color: "#6B7280" }} />
    </div>
  );
}

function SectionTitle({ children }) {
  return <div style={{ fontSize: 14, fontWeight: 700, color: "#111827", textTransform: "uppercase", letterSpacing: 0.6, marginBottom: 14 }}>{children}</div>;
}

function PricingCalculator() {
  const I = window.LIcons;
  const [form, setForm] = useState({
    material: "UV Resin",
    used: "", costPerKgL: "",
    printTime: "", elecRate: "", power: "", printerCost: "", lifespan: "",
    laborTime: "", hourlyRate: "", packaging: "", feesPct: "",
    marginPct: 40,
  });

  const placeholders = {
    used: "25", costPerKgL: "45.00",
    printTime: "2.5", elecRate: "0.12", power: "200", printerCost: "800", lifespan: "5000",
    laborTime: "0.5", hourlyRate: "20.00", packaging: "1.50", feesPct: "6.5",
  };

  const set = (k) => (v) => setForm(s => ({ ...s, [k]: v }));

  const [result, setResult] = useState(null);
  const resultRef = useRef(null);

  function num(v, fallback) {
    if (v === "" || v == null || isNaN(parseFloat(v))) return parseFloat(fallback);
    return parseFloat(v);
  }

  function calculate() {
    const used = num(form.used, placeholders.used);
    const costPerKgL = num(form.costPerKgL, placeholders.costPerKgL);
    const printTime = num(form.printTime, placeholders.printTime);
    const elecRate = num(form.elecRate, placeholders.elecRate);
    const power = num(form.power, placeholders.power);
    const printerCost = num(form.printerCost, placeholders.printerCost);
    const lifespan = num(form.lifespan, placeholders.lifespan);
    const laborTime = num(form.laborTime, placeholders.laborTime);
    const hourlyRate = num(form.hourlyRate, placeholders.hourlyRate);
    const packaging = num(form.packaging, placeholders.packaging);
    const feesPct = num(form.feesPct, placeholders.feesPct);
    const marginPct = num(form.marginPct, 40);

    const materialCost   = (used / 1000) * costPerKgL;
    const electricityCost = (printTime * power / 1000) * elecRate;
    const printerDeprec  = (printerCost / lifespan) * printTime;
    const laborCost      = laborTime * hourlyRate;
    const subtotal       = materialCost + electricityCost + printerDeprec + laborCost + packaging;
    const platformFees   = subtotal * (feesPct / 100);
    const totalCost      = subtotal + platformFees;
    const profit         = totalCost * (marginPct / 100);
    const sellingPrice   = totalCost + profit;

    setResult({
      material: form.material,
      materialCost, electricityCost, printerDeprec, laborCost, packaging,
      subtotal, platformFees, totalCost, profit, sellingPrice, marginPct
    });
  }

  const [history, setHistory] = useState([
    { name: "Resin Earrings",         mat: "UV Resin",     cost: 13.09, price: 23.43, margin: 40, date: "Apr 20" },
    { name: "Wedding Favor (Single)", mat: "UV Resin",     cost: 8.75,  price: 15.31, margin: 40, date: "Apr 18" },
    { name: "Custom Keychain",        mat: "PLA Filament", cost: 5.20,  price: 8.84,  margin: 35, date: "Apr 15" },
  ]);

  const [savedToast, setSavedToast] = useState(false);
  function saveHistory() {
    if (!result) return;
    const date = new Date().toLocaleDateString("en-US", { month: "short", day: "numeric" });
    setHistory(h => [
      { name: `Custom ${result.material} Item`, mat: result.material, cost: result.totalCost, price: result.sellingPrice, margin: result.marginPct, date },
      ...h
    ]);
    setSavedToast(true);
    setTimeout(() => setSavedToast(false), 2000);
  }

  return (
    <div>
      <PageHeader title="Pricing Calculator" subtitle="Calculate the true cost and selling price of your products" />

      <div className="grid gap-5" style={{ gridTemplateColumns: "55% 45%" }}>
        {/* LEFT — input form */}
        <Card>
          {/* Material Costs */}
          <SectionTitle>Material Costs</SectionTitle>
          <div className="grid grid-cols-2 gap-4 mb-6">
            <div className="col-span-2">
              <FormField label="Material Type">
                <Select value={form.material} onChange={set("material")} options={MATERIAL_TYPES} />
              </FormField>
            </div>
            <FormField label="Material Used" hint="grams or milliliters">
              <Input value={form.used} onChange={set("used")} placeholder={placeholders.used} suffix="g/ml" />
            </FormField>
            <FormField label="Material Cost per kg/L" hint="bulk price">
              <Input value={form.costPerKgL} onChange={set("costPerKgL")} placeholder={placeholders.costPerKgL} prefix="$" />
            </FormField>
          </div>

          <div style={{ height: 1, background: "#F3F4F6", margin: "4px 0 20px" }} />

          {/* Machine Costs */}
          <SectionTitle>Machine Costs</SectionTitle>
          <div className="grid grid-cols-2 gap-4 mb-6">
            <FormField label="Print Time (hours)">
              <Input value={form.printTime} onChange={set("printTime")} placeholder={placeholders.printTime} suffix="hrs" />
            </FormField>
            <FormField label="Electricity Rate ($/kWh)">
              <Input value={form.elecRate} onChange={set("elecRate")} placeholder={placeholders.elecRate} prefix="$" />
            </FormField>
            <FormField label="Printer Power (watts)">
              <Input value={form.power} onChange={set("power")} placeholder={placeholders.power} suffix="W" />
            </FormField>
            <FormField label="Printer Cost ($)">
              <Input value={form.printerCost} onChange={set("printerCost")} placeholder={placeholders.printerCost} prefix="$" />
            </FormField>
            <div className="col-span-2">
              <FormField label="Expected Printer Lifespan (hours)">
                <Input value={form.lifespan} onChange={set("lifespan")} placeholder={placeholders.lifespan} suffix="hrs" />
              </FormField>
            </div>
          </div>

          <div style={{ height: 1, background: "#F3F4F6", margin: "4px 0 20px" }} />

          {/* Labor & Overhead */}
          <SectionTitle>Labor &amp; Overhead</SectionTitle>
          <div className="grid grid-cols-2 gap-4 mb-6">
            <FormField label="Labor Time (hours)">
              <Input value={form.laborTime} onChange={set("laborTime")} placeholder={placeholders.laborTime} suffix="hrs" />
            </FormField>
            <FormField label="Hourly Rate ($)">
              <Input value={form.hourlyRate} onChange={set("hourlyRate")} placeholder={placeholders.hourlyRate} prefix="$" />
            </FormField>
            <FormField label="Packaging Cost ($)">
              <Input value={form.packaging} onChange={set("packaging")} placeholder={placeholders.packaging} prefix="$" />
            </FormField>
            <FormField label="Platform Fees (%)">
              <Input value={form.feesPct} onChange={set("feesPct")} placeholder={placeholders.feesPct} suffix="%" />
            </FormField>
          </div>

          <div style={{ height: 1, background: "#F3F4F6", margin: "4px 0 20px" }} />

          {/* Profit */}
          <SectionTitle>Profit</SectionTitle>
          <FormField label={`Desired Profit Margin: ${form.marginPct}%`}>
            <div className="flex items-center gap-4">
              <input
                type="range" min="0" max="100" step="1"
                value={form.marginPct}
                onChange={(e) => set("marginPct")(parseFloat(e.target.value))}
                className="flex-1"
                style={{ accentColor: "#D97757" }}
              />
              <div style={{ width: 80 }}>
                <Input value={form.marginPct} onChange={(v) => set("marginPct")(parseFloat(v) || 0)} placeholder="40" suffix="%" />
              </div>
            </div>
          </FormField>

          <button
            onClick={calculate}
            className="w-full mt-6 transition-colors"
            style={{ background: "#D97757", color: "white", borderRadius: 8, padding: "12px", fontSize: 14, fontWeight: 600 }}
            onMouseEnter={(e) => e.currentTarget.style.background = "#C25E3F"}
            onMouseLeave={(e) => e.currentTarget.style.background = "#D97757"}
          >
            Calculate Price
          </button>
        </Card>

        {/* RIGHT — breakdown */}
        <div ref={resultRef}>
          <Card>
            <div className="flex items-center justify-between mb-5">
              <div style={{ fontSize: 16, fontWeight: 600 }}>Price Breakdown</div>
              {result && <span style={{ fontSize: 11, fontWeight: 600, color: "#16A34A", background: "#DCFCE7", padding: "3px 9px", borderRadius: 999 }}>CALCULATED</span>}
            </div>
            {!result ? (
              <div style={{ background: "#FAF9F5", border: "1px dashed #E5E7EB", borderRadius: 10, padding: "48px 20px", textAlign: "center", color: "#6B7280", fontSize: 14 }}>
                Enter your costs and click Calculate to see the breakdown.
              </div>
            ) : (
              <div>
                <BreakRow label="Material Cost" v={result.materialCost} />
                <BreakRow label="Electricity Cost" v={result.electricityCost} />
                <BreakRow label="Printer Depreciation" v={result.printerDeprec} />
                <BreakRow label="Labor Cost" v={result.laborCost} />
                <BreakRow label="Packaging" v={result.packaging} />
                <BreakRow label="Subtotal" v={result.subtotal} bold />
                <BreakRow label="Platform Fees" v={result.platformFees} />
                <BreakRow label="Total Cost" v={result.totalCost} bold last />

function BreakRow({ label, v, bold, last }) {
  return (
    <div className="flex items-center justify-between" style={{
      padding: "10px 0",

      fontWeight: bold ? 700 : 500,

      color: bold ? "#111827" : "#374151"
    }}>
      <span>{label}</span>
      <span className="num-tabular">{fmtUSD(v)}</span>
    </div>
  );
}

];

function Inventory() {
  const I = window.LIcons;
  const [q, setQ] = useState("");
  const [cat, setCat] = useState("All Categories");
  const [rows, setRows] = useState(INVENTORY);
  const [addOpen, setAddOpen] = useState(false);
  const emptyForm = { name: "", cat: "Resin", qty: "", unit: "ml", reorder: "" };
  const [form, setForm] = useState(emptyForm);
  const [err, setErr] = useState("");

  const filtered = useMemo(() => {
    return rows.filter(r =>
      (cat === "All Categories" || r.cat === cat) &&
      (q.trim() === "" || r.name.toLowerCase().includes(q.toLowerCase()) || r.cat.toLowerCase().includes(q.toLowerCase()))
    );
  }, [q, cat, rows]);

  const summary = useMemo(() => ({
    total: rows.length,
    cats: new Set(rows.map(r => r.cat)).size,
    low: rows.filter(r => r.status === "Low" || r.status === "Critical").length,
    out: rows.filter(r => r.status === "Out of Stock").length,
  }), [rows]);

  const computeStatus = (qty, reorder) => {
    if (qty <= 0) return "Out of Stock";
    if (reorder > 0 && qty <= reorder * 0.5) return "Critical";
    if (qty < reorder) return "Low";
    return "In Stock";
  };

  const closeAdd = () => { setAddOpen(false); setForm(emptyForm); setErr(""); };

  const handleAdd = () => {
    const name = form.name.trim();
    const unit = form.unit.trim();
    const qty = Number(form.qty);
    const reorder = Number(form.reorder);
    if (!name) return setErr("Material name is required.");
    if (!unit) return setErr("Unit is required.");
    if (!Number.isFinite(qty) || qty < 0) return setErr("Quantity must be a non-negative number.");
    if (!Number.isFinite(reorder) || reorder < 0) return setErr("Reorder point must be a non-negative number.");
    const today = new Date().toLocaleDateString("en-US", { month: "short", day: "numeric" });
    setRows([{ name, cat: form.cat, qty, unit, reorder, status: computeStatus(qty, reorder), date: today }, ...rows]);
    closeAdd();
  };

  const inputStyle = { background: "#FAF9F5", border: "1px solid #E5E7EB", borderRadius: 8, padding: "10px 12px", fontSize: 14, color: "#111827", width: "100%", outline: "none" };
  const labelStyle = { fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 6, display: "block" };

  return (
    <div>
      <PageHeader title="Inventory Tracking" subtitle="Monitor your material stock in real time" />

      {/* Summary cards */}
      <div className="grid grid-cols-3 gap-5 mb-5">
        <Card>
          <div style={{ fontSize: 13, color: "#6B7280", fontWeight: 500 }}>Total Materials</div>
          <div className="num-tabular" style={{ fontSize: 28, fontWeight: 700, color: "#D97757", marginTop: 8 }}>{summary.total}</div>
          <div style={{ fontSize: 12, color: "#6B7280", marginTop: 4 }}>Across {summary.cats} {summary.cats === 1 ? "category" : "categories"}</div>
        </Card>
        <Card>
          <div style={{ fontSize: 13, color: "#6B7280", fontWeight: 500 }}>Low Stock Items</div>
          <div className="num-tabular" style={{ fontSize: 28, fontWeight: 700, color: "#F59E0B", marginTop: 8 }}>{summary.low}</div>
          <div style={{ fontSize: 12, color: "#6B7280", marginTop: 4 }}>Below reorder point</div>
        </Card>
        <Card>
          <div style={{ fontSize: 13, color: "#6B7280", fontWeight: 500 }}>Out of Stock</div>
          <div className="num-tabular" style={{ fontSize: 28, fontWeight: 700, color: "#DC2626", marginTop: 8 }}>{summary.out}</div>
          <div style={{ fontSize: 12, color: "#6B7280", marginTop: 4 }}>Needs immediate reorder</div>
        </Card>
      </div>

      {/* Action bar */}
      <Card padding={0}>
        <div className="flex items-center gap-3" style={{ padding: "16px 20px", borderBottom: "1px solid #E5E7EB" }}>
          <div className="flex items-center gap-2 flex-1" style={{ background: "#FAF9F5", border: "1px solid #E5E7EB", borderRadius: 8, padding: "0 12px", height: 40, maxWidth: 360 }}>
            <I.Search size={16} color="#6B7280" />
            <input
              value={q}
              onChange={(e) => setQ(e.target.value)}
              placeholder="Search materials..."
              className="flex-1 outline-none bg-transparent"
              style={{ fontSize: 14, height: "100%", color: "#111827" }}
            />
          </div>
          <div style={{ width: 200 }}>
            <Select value={cat} onChange={setCat} options={["All Categories","Resin","Filament","Accessories"]} />
          </div>
          <div className="flex-1" />
          <button
            onClick={() => setAddOpen(true)}
            className="flex items-center gap-2 transition-colors"
            style={{ background: "#D97757", color: "white", borderRadius: 8, padding: "10px 16px", fontSize: 14, fontWeight: 600 }}

          >
            <I.Plus size={16} /> Add Material

        </div>

        <table className="w-full">
          <thead>
            <tr style={{ background: "#FAF9F5", borderBottom: "1px solid #E5E7EB" }}>
              {["Material Name","Category","Quantity","Reorder Point","Status","Last Updated",""].map(h => (

              <tr key={r.name} style={{ borderBottom: i < filtered.length - 1 ? "1px solid #F3F4F6" : "none" }}>
                <td style={{ padding: "14px 24px", fontSize: 14, fontWeight: 600, color: "#111827" }}>{r.name}</td>
                <td style={{ padding: "14px 24px", fontSize: 14, color: "#374151" }}>{r.cat}</td>
                <td style={{ padding: "14px 24px", fontSize: 14, color: r.qty === 0 ? "#DC2626" : "#111827", fontWeight: 600 }} className="num-tabular">{r.qty} {r.unit}</td>

                <td style={{ padding: "14px 24px", fontSize: 14, color: "#6B7280" }}>{r.date}</td>
                <td style={{ padding: "14px 24px", textAlign: "right" }}>
                  <button style={{ width: 28, height: 28, borderRadius: 6, color: "#6B7280" }}><I.MoreHorizontal size={18} /></button>
                </td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr><td colSpan="7" style={{ padding: "40px 24px", textAlign: "center", color: "#6B7280", fontSize: 14 }}>No materials match your filters.</td></tr>
            )}
          </tbody>
        </table>
      </Card>

      {/* Add Material Modal */}
      <Modal open={addOpen} onClose={closeAdd} title="Add New Material" subtitle="Track a new item in your inventory" width={520}>
        <div className="flex flex-col gap-4">
          <div>
            <label style={labelStyle}>Material Name</label>
            <input
              autoFocus
              value={form.name}
              onChange={(e) => setForm({ ...form, name: e.target.value })}
              placeholder="e.g., UV Resin (Amber)"
              style={inputStyle}
            />
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label style={labelStyle}>Category</label>
              <Select value={form.cat} onChange={(v) => setForm({ ...form, cat: v })} options={["Resin","Filament","Accessories"]} />
            </div>
            <div>
              <label style={labelStyle}>Unit</label>
              <Select value={form.unit} onChange={(v) => setForm({ ...form, unit: v })} options={["ml","g","pcs","sheets","sets"]} />
            </div>
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label style={labelStyle}>Quantity</label>
              <input
                type="number"
                min="0"
                value={form.qty}
                onChange={(e) => setForm({ ...form, qty: e.target.value })}
                placeholder="0"
                style={inputStyle}
                className="num-tabular"
              />
            </div>
            <div>
              <label style={labelStyle}>Reorder Point</label>
              <input
                type="number"
                min="0"
                value={form.reorder}
                onChange={(e) => setForm({ ...form, reorder: e.target.value })}
                placeholder="0"
                style={inputStyle}
                className="num-tabular"
              />
            </div>
          </div>
          {err && (
            <div style={{ background: "#FEE2E2", color: "#B91C1C", border: "1px solid #FECACA", borderRadius: 8, padding: "8px 12px", fontSize: 13 }}>
              {err}
            </div>
          )}
          <div className="flex items-center justify-end gap-2" style={{ marginTop: 4 }}>
            <button
              onClick={closeAdd}
              style={{ background: "white", color: "#374151", border: "1px solid #E5E7EB", borderRadius: 8, padding: "10px 16px", fontSize: 14, fontWeight: 600 }}
            >Cancel</button>
            <button
              onClick={handleAdd}
              className="flex items-center gap-2 transition-colors"
              style={{ background: "#D97757", color: "white", borderRadius: 8, padding: "10px 16px", fontSize: 14, fontWeight: 600 }}
              onMouseEnter={(e) => e.currentTarget.style.background = "#C25E3F"}
              onMouseLeave={(e) => e.currentTarget.style.background = "#D97757"}
            >
              <I.Plus size={16} /> Add Material
            </button>
          </div>
        </div>
      </Modal>
    </div>
  );
}

  // Build SVG path for the line chart
  const W = 760, H = 220, PADX = 40, PADY = 24;
  const minV = data.trendRange.min, maxV = data.trendRange.max;
  const xAt = (i) => PADX + (i * (W - PADX * 2)) / (trend.length - 1);
  const yAt = (v) => PADY + (1 - (v - minV) / (maxV - minV)) * (H - PADY * 2);
  const linePath = trend.map((p, i) => (i === 0 ? "M" : "L") + xAt(i) + "," + yAt(p.v)).join(" ");
  const areaPath = linePath + ` L ${xAt(trend.length - 1)},${H - PADY} L ${xAt(0)},${H - PADY} Z`;
  const yTicks = [0, 1, 2, 3, 4].map(i => maxV - (i * (maxV - minV)) / 4);

  const donutR = 70, donutCx = 100, donutCy = 100, stroke = 24;
  const arcs = expenses.map((e, i) => {

    const end = cum;
    const a0 = start * Math.PI * 2 - Math.PI / 2;
    const a1 = end * Math.PI * 2 - Math.PI / 2;
    const large = end - start > 0.5 ? 1 : 0;
    const x0 = donutCx + donutR * Math.cos(a0);
    const y0 = donutCy + donutR * Math.sin(a0);
    const x1 = donutCx + donutR * Math.cos(a1);
    const y1 = donutCy + donutR * Math.sin(a1);
    return `M${x0},${y0} A${donutR},${donutR} 0 ${large} 1 ${x1},${y1}`;
  });

  const maxRev = Math.max(...products.map(p => p.rev));

const SETTINGS_KEY = "printops360.settings";
const DEFAULT_SETTINGS = {
  businessName: "Layla's Print Studio",
  ownerName: "Layla Mitchell",
  email: "layla@printops360.com",
  phone: "+1 (555) 123-4567",
  currency: "USD ($)",
  taxRate: "8.5",
  defaultReorderPoint: "100",
  lowStockAlerts: true,
  orderUpdates: true,
  weeklyDigest: false,
};

function loadSettings() {
  try {
    const v = localStorage.getItem(SETTINGS_KEY);
    return v ? { ...DEFAULT_SETTINGS, ...JSON.parse(v) } : DEFAULT_SETTINGS;
  } catch { return DEFAULT_SETTINGS; }
}

function Settings() {
  const I = window.LIcons;
  const [s, setS] = useState(loadSettings);
  const [saved, setSaved] = useState(false);

  const upd = (k, v) => setS(prev => ({ ...prev, [k]: v }));

  const handleSave = () => {
    try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch {}
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  const handleReset = () => {
    setS(DEFAULT_SETTINGS);
    try { localStorage.removeItem(SETTINGS_KEY); } catch {}
  };

  const inputStyle = { background: "#FAF9F5", border: "1px solid #E5E7EB", borderRadius: 8, padding: "10px 12px", fontSize: 14, color: "#111827", width: "100%", outline: "none" };

          )}
          <button
            onClick={handleSave}
            className="flex items-center gap-2 transition-colors"
            style={{ background: "#D97757", color: "white", borderRadius: 8, padding: "10px 18px", fontSize: 14, fontWeight: 600 }}
            onMouseEnter={(e) => e.currentTarget.style.background = "#C25E3F"}
            onMouseLeave={(e) => e.currentTarget.style.background = "#D97757"}
          >
            <I.Save size={16} /> Save Changes
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// INTRO SCREEN — B&W 3D-printing themed
// ============================================================
function WireShape({ type, top, left, size, dur, reverse, opacity }) {
  let svg;
  const sw = 1.2;
  if (type === "cube") {
    svg = (
      <svg viewBox="0 0 100 100" width={size} height={size}>
        <polygon points="50,8 92,30 50,52 8,30" fill="none" stroke="white" strokeWidth={sw} />
        <polygon points="8,30 50,52 50,92 8,70" fill="none" stroke="white" strokeWidth={sw} />
        <polygon points="50,52 92,30 92,70 50,92" fill="none" stroke="white" strokeWidth={sw} />
      </svg>
    );
  } else if (type === "octa") {
    svg = (
      <svg viewBox="0 0 100 100" width={size} height={size}>
        <polygon points="50,8 92,50 50,92 8,50" fill="none" stroke="white" strokeWidth={sw} />
        <polygon points="50,8 70,50 50,92 30,50" fill="none" stroke="white" strokeWidth={sw * 0.8} />
        <line x1="8" y1="50" x2="92" y2="50" stroke="white" strokeWidth={sw * 0.7} />
      </svg>
    );
  } else if (type === "pyramid") {
    svg = (
      <svg viewBox="0 0 100 100" width={size} height={size}>
        <polygon points="50,8 92,80 8,80" fill="none" stroke="white" strokeWidth={sw} />
        <line x1="50" y1="8" x2="50" y2="80" stroke="white" strokeWidth={sw * 0.7} strokeDasharray="2 3" />
        <line x1="8" y1="80" x2="92" y2="80" stroke="white" strokeWidth={sw} />
      </svg>
    );
  } else { // gear / hexagon
    svg = (
      <svg viewBox="0 0 100 100" width={size} height={size}>
        <polygon points="50,8 86,28 86,72 50,92 14,72 14,28" fill="none" stroke="white" strokeWidth={sw} />
        <polygon points="50,28 70,40 70,60 50,72 30,60 30,40" fill="none" stroke="white" strokeWidth={sw * 0.8} />
        <circle cx="50" cy="50" r="6" fill="none" stroke="white" strokeWidth={sw * 0.7} />
      </svg>
    );
  }
  return (
    <div style={{
      position: "absolute", top: `${top}%`, left: `${left}%`,
      opacity: opacity ?? 0.55,
      animation: `spin3d ${dur}s linear infinite ${reverse ? "reverse" : ""}`,
      filter: "drop-shadow(0 0 8px rgba(255,255,255,0.18))",
      willChange: "transform",
    }}>
      {svg}
    </div>
  );
}

function IntroScreen({ onComplete }) {
  const [fading, setFading] = useState(false);

  const shapes = useMemo(() => [
    { type: "cube",    top: 10, left: 7,  size: 120, dur: 24 },
    { type: "octa",    top: 70, left: 82, size: 100, dur: 28, reverse: true },
    { type: "pyramid", top: 74, left: 9,  size: 110, dur: 22 },
    { type: "cube",    top: 14, left: 80, size: 85,  dur: 20, reverse: true },
    { type: "octa",    top: 44, left: 3,  size: 65,  dur: 18 },
    { type: "hex",     top: 50, left: 92, size: 58,  dur: 30 },
    { type: "pyramid", top: 4,  left: 46, size: 60,  dur: 32, reverse: true, opacity: 0.35 },
    { type: "hex",     top: 86, left: 48, size: 55,  dur: 21, opacity: 0.4 },
    { type: "cube",    top: 38, left: 18, size: 40,  dur: 26, opacity: 0.35 },
    { type: "octa",    top: 60, left: 70, size: 38,  dur: 23, reverse: true, opacity: 0.35 },
  ], []);

  // Layer-build path (vase silhouette being "printed" bottom-up)
  const vaseLayers = useMemo(() => {
    const layers = [];
    for (let i = 0; i < 28; i++) {
      const t = i / 27;
      // vase profile — wider in the middle, narrow at top/bottom
      const w = 36 + Math.sin(t * Math.PI) * 28 + (1 - t) * 8;
      const y = 220 - i * 7; // bottom-up
      layers.push({ y, w, delay: i * 0.08 });
    }
    return layers;
  }, []);

  // Intro loops indefinitely — only a tap/key dismisses it.
  useEffect(() => {
    const onKey = () => skip();
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  function skip() {
    setFading(true);
    setTimeout(onComplete, 600);
  }

  return (
    <div
      onClick={skip}
      style={{
        position: "fixed", inset: 0, zIndex: 100,
        background: "#080808",
        opacity: fading ? 0 : 1,
        transition: "opacity 0.7s ease-out",
        cursor: "pointer",
        overflow: "hidden",
        userSelect: "none",
      }}
    >
      {/* CAD-style dot grid */}
      <div style={{
        position: "absolute", inset: 0,
        backgroundImage: "radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1.2px)",
        backgroundSize: "26px 26px",
      }} />

      {/* Vignette */}
      <div style={{
        position: "absolute", inset: 0,
        background: "radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.75) 100%)",
        pointerEvents: "none",
      }} />

      {/* Wireframe rotating shapes */}
      {shapes.map((s, i) => <WireShape key={i} {...s} />)}

      {/* Layer-build vase (left of center, faint) */}
      <svg
        width="240" height="240" viewBox="0 0 240 240"
        style={{
          position: "absolute", top: "50%", left: "16%",
          transform: "translate(-50%,-50%)",
          opacity: 0.35,
        }}
      >
        {vaseLayers.map((l, i) => (
          <line
            key={i}
            x1={120 - l.w} x2={120 + l.w}
            y1={l.y} y2={l.y}
            stroke="white" strokeWidth="1.4"
            strokeDasharray="200" strokeDashoffset="200"
            style={{ animation: `layerBuild 2.4s ease-out ${l.delay}s infinite` }}
          />
        ))}
        {/* Build platform */}
        <line x1="60" y1="225" x2="180" y2="225" stroke="white" strokeWidth="2" />
        <line x1="55" y1="228" x2="185" y2="228" stroke="white" strokeWidth="0.6" opacity="0.5" />
      </svg>

      {/* Layer-build vase (right of center, faint) */}
      <svg
        width="240" height="240" viewBox="0 0 240 240"
        style={{
          position: "absolute", top: "50%", left: "84%",
          transform: "translate(-50%,-50%)",
          opacity: 0.35,
        }}
      >
        {vaseLayers.map((l, i) => (
          <line
            key={i}
            x1={120 - l.w} x2={120 + l.w}
            y1={l.y} y2={l.y}
            stroke="white" strokeWidth="1.4"
            strokeDasharray="200" strokeDashoffset="200"
            style={{ animation: `layerBuild 2.4s ease-out ${l.delay + 0.4}s infinite` }}
          />
        ))}
        <line x1="60" y1="225" x2="180" y2="225" stroke="white" strokeWidth="2" />
        <line x1="55" y1="228" x2="185" y2="228" stroke="white" strokeWidth="0.6" opacity="0.5" />
      </svg>

      {/* Print-head scan lines */}
      <div style={{
        position: "absolute", left: 0, right: 0, height: 1,
        background: "linear-gradient(90deg, transparent, rgba(255,255,255,0.85), transparent)",
        boxShadow: "0 0 14px rgba(255,255,255,0.45)",
        animation: "scanDown 5s linear infinite",
      }} />
      <div style={{
        position: "absolute", left: 0, right: 0, height: 1,
        background: "linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent)",
        animation: "scanUp 7s linear infinite 1.4s",
      }} />

      {/* Print-head gantry near top, sweeping side-to-side */}
      <div style={{
        position: "absolute", top: 28, left: "50%",
        transform: "translateX(-50%)",
        width: "60%", height: 16,
        animation: "printerSweep 6s ease-in-out infinite",
        opacity: 0.5,
      }}>
        <div style={{
          width: "100%", height: 2,
          background: "linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent)",
        }} />
        <div style={{
          width: 14, height: 14,
          background: "white", margin: "0 auto", marginTop: -8,
          clipPath: "polygon(50% 0, 100% 50%, 50% 100%, 0 50%)",
          boxShadow: "0 0 12px rgba(255,255,255,0.6)",
        }} />
      </div>

      {/* Center title block */}
      <div style={{
        position: "absolute", inset: 0,
        display: "flex", alignItems: "center", justifyContent: "center",
        flexDirection: "column", gap: 14, padding: 24,
        zIndex: 2,
      }}>
        <div style={{
          fontFamily: "'Anton', 'Oswald', 'Bebas Neue', Impact, sans-serif",
          fontSize: "clamp(56px, 13vw, 170px)",
          fontWeight: 400,
          color: "#FFFFFF",
          letterSpacing: "0.005em",
          textAlign: "center",
          lineHeight: 0.9,
          textTransform: "none",
          animation: "introTitleIn 1.4s cubic-bezier(0.2,0.7,0.2,1) forwards, whiteGlow 3s ease-in-out 1.4s infinite",
          opacity: 0,
        }}>
          Noureldin Submission
        </div>
        <div style={{
          fontFamily: "'Inter', sans-serif",
          fontSize: "clamp(10px, 1.1vw, 12px)",
          color: "rgba(255,255,255,0)",
          letterSpacing: "0.6em",
          textTransform: "uppercase",
          fontWeight: 500,
          paddingLeft: "0.6em",
          animation: "introSubIn 1s ease-out 1.6s forwards",
        }}>
          PrintOps 360 — Usability Submission
        </div>
        <div style={{
          marginTop: 28,
          fontSize: 11, color: "rgba(255,255,255,0.6)",
          letterSpacing: "0.4em", textTransform: "uppercase",
          fontFamily: "'Inter', sans-serif",
          fontWeight: 600,
          animation: "introSubIn 1s ease-out 2.6s forwards, hintPulse 2.2s ease-in-out 3.6s infinite",
          opacity: 0,
        }}>
          tap anywhere to enter
        </div>
      </div>
    </div>
  );
}

// APP SHELL

function App() {
  const [showIntro, setShowIntro] = useState(true);
  const [screen, setScreen] = useState("dashboard");
  const screens = {
    dashboard: <Dashboard onNavigate={setScreen} />,
    pricing:   <PricingCalculator />,
    inventory: <Inventory />,
    analytics: <FinancialAnalytics />,
    reports:   <Reports />,
    settings:  <Settings />,
  };
  const labels = {
    dashboard: "01 Dashboard", pricing: "02 Pricing Calculator",
    inventory: "03 Inventory", analytics: "04 Financial Analytics",
    reports: "05 Reports", settings: "06 Settings"
  };

  return (
    <React.Fragment>
      {showIntro && <IntroScreen onComplete={() => setShowIntro(false)} />}
      <div className="flex h-full" style={{ background: "#FAF9F5" }} data-screen-label={labels[screen]}>
        <Sidebar active={screen} onNavigate={setScreen} />
        <main className="flex-1 overflow-auto scroll-hide" style={{ padding: 32 }}>
          {screens[screen]}
        </main>
      </div>
    </React.Fragment>
  );
}

bootWhenReady(() => {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
});
